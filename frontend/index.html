<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloomNote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  </head>
  <body data-page="home">
    <div id="app">
      <header class="topbar">
        <button id="brand-home" class="brand brand-btn" type="button">BloomNote</button>
        <nav class="nav-links">
          <button data-section="home" class="nav-btn active" type="button">Trang chủ</button>
          <button data-section="intro" class="nav-btn" type="button">Giới thiệu</button>
          <button data-section="about" class="nav-btn" type="button">Về chúng tôi</button>
          <button id="nav-login" class="nav-btn nav-login" type="button">Đăng nhập</button>
          <button id="language-toggle" class="lang-btn" type="button">EN</button>
        </nav>
      </header>

      <main class="main-shell public-page">
        <section id="home" class="landing-section hero-section">
          <div class="hero-copy panel-shell">
            <p id="home-kicker" class="section-kicker"></p>
            <h1 id="home-title"></h1>
            <p id="home-text" class="hero-text"></p>
            <div id="hero-tags" class="hero-tags"></div>
            <div class="hero-actions">
              <button id="hero-about" class="primary-btn" type="button">Khám phá thêm</button>
              <button id="hero-login" class="secondary-btn" type="button">Mở khu đăng nhập</button>
            </div>
          </div>
          <div class="hero-feature panel-shell">
            <div class="feature-card feature-card-main">
              <span class="feature-label">Không gian riêng tư</span>
              <h3>Nhật ký được viết trong một giao diện nhẹ, ấm và tập trung.</h3>
              <p id="feature-home-copy"></p>
            </div>
            <div class="feature-grid">
              <div class="feature-card">
                <span class="feature-label">Bảo mật</span>
                <p id="feature-encryption"></p>
              </div>
              <div class="feature-card">
                <span class="feature-label">Kích hoạt</span>
                <p id="feature-otp"></p>
              </div>
            </div>
          </div>
        </section>

        <section id="intro" class="landing-section info-section">
          <div class="section-heading">
            <p id="intro-kicker" class="section-kicker"></p>
            <h2 id="intro-title"></h2>
          </div>
          <div class="info-grid">
            <article class="info-card panel-shell">
              <h3 id="intro-card-title-1"></h3>
              <p id="intro-card-text-1"></p>
            </article>
            <article class="info-card panel-shell">
              <h3 id="intro-card-title-2"></h3>
              <p id="intro-card-text-2"></p>
            </article>
            <article class="info-card panel-shell">
              <h3 id="intro-card-title-3"></h3>
              <p id="intro-card-text-3"></p>
            </article>
          </div>
        </section>

        <section id="about" class="landing-section about-section">
          <div class="about-panel panel-shell">
            <div>
              <p id="about-kicker" class="section-kicker"></p>
              <h2 id="about-title"></h2>
            </div>
            <p id="about-text" class="about-text"></p>
          </div>
          <div class="about-stats">
            <div class="stat-card panel-shell"><strong>01</strong><span id="about-stat-1"></span></div>
            <div class="stat-card panel-shell"><strong>02</strong><span id="about-stat-2"></span></div>
            <div class="stat-card panel-shell"><strong>03</strong><span id="about-stat-3"></span></div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="./app.js"></script>
  </body>
</html>
