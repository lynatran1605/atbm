<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloomNote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  </head>
  <body data-page="home">
    <div id="app" class="home-splash">
      <header class="home-topbar">
        <div class="home-topbar-left">
          <button id="brand-home" class="home-logo-btn" type="button" aria-label="BloomNote home">
            <img src="./images/logo-hub.webp" alt="BloomNote logo" class="home-logo-image" />
          </button>
        </div>
        <div class="home-top-actions">
          <nav class="nav-links home-nav-links">
            <button data-section="home" class="nav-btn active" type="button">Trang chủ</button>
            <button data-section="intro" class="nav-btn" type="button">Giới thiệu</button>
            <button data-section="about" class="nav-btn" type="button">Về chúng tôi</button>
          </nav>
          <button id="nav-login" class="nav-btn nav-login" type="button">Đăng nhập</button>
          <button id="language-toggle" class="lang-btn" type="button">EN</button>
        </div>
      </header>

      <main class="home-splash-main">
        <section id="home" class="home-splash-hero">
          <p id="home-kicker" class="home-splash-kicker"></p>
          <h1 id="home-title" class="home-splash-title"></h1>
          <p id="home-text" class="home-splash-text"></p>
          <div id="hero-tags" class="home-splash-tags"></div>
          <div class="home-splash-actions">
            <button id="hero-login" class="primary-btn" type="button">Mở khu đăng nhập</button>
          </div>
        </section>

        <button id="hero-about" class="hidden" type="button" aria-hidden="true"></button>

        <section id="intro" class="landing-section info-section home-info-section">
          <div class="section-heading">
            <p id="intro-kicker" class="section-kicker"></p>
            <h2 id="intro-title"></h2>
          </div>
          <div class="info-grid">
            <article class="info-card panel-shell">
              <h3 id="intro-card-title-1"></h3>
              <p id="intro-card-text-1"></p>
            </article>
            <article class="info-card panel-shell">
              <h3 id="intro-card-title-2"></h3>
              <p id="intro-card-text-2"></p>
            </article>
            <article class="info-card panel-shell">
              <h3 id="intro-card-title-3"></h3>
              <p id="intro-card-text-3"></p>
            </article>
          </div>
        </section>

        <section id="about" class="landing-section about-section home-about-section">
          <div class="about-panel panel-shell">
            <div>
              <p id="about-kicker" class="section-kicker"></p>
              <h2 id="about-title"></h2>
            </div>
            <p id="about-text" class="about-text"></p>
          </div>
          <div class="about-stats">
            <div class="stat-card panel-shell"><strong>01</strong><span id="about-stat-1"></span></div>
            <div class="stat-card panel-shell"><strong>02</strong><span id="about-stat-2"></span></div>
            <div class="stat-card panel-shell"><strong>03</strong><span id="about-stat-3"></span></div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="./app.js"></script>
  </body>
</html>
